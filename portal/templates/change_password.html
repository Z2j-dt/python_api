<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>修改密码 - 数据中台门户</title>
    <link rel="icon" href="{{ url_for('static', filename='img/大同.png') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}?v={{ build_version }}">
    <style>
        .pwd-wrap { max-width: 420px; margin: 2rem auto; padding: 1.5rem; }
        .pwd-wrap h1 { font-size: 1.2rem; margin: 0 0 1rem; }
        .pwd-field { margin-bottom: 0.85rem; }
        .pwd-field label { display: block; font-size: 0.9rem; margin-bottom: 0.25rem; }
        .pwd-field input { width: 100%; box-sizing: border-box; padding: 0.45rem 0.5rem; }
        .pwd-err { color: #b02a37; font-size: 0.9rem; margin-bottom: 0.75rem; }
        .pwd-actions { margin-top: 1rem; display: flex; gap: 0.75rem; align-items: center; flex-wrap: wrap; }
        .btn { padding: 0.45rem 1rem; border-radius: 6px; border: 1px solid #0d6efd; background: #0d6efd; color: #fff; cursor: pointer; font-size: 0.9rem; }
        .btn-secondary { background: #fff; color: #333; border-color: #ccc; text-decoration: none; display: inline-block; }
    </style>
</head>
<body>
    <div class="pwd-wrap">
        <h1>修改密码</h1>
        <p style="font-size:0.9rem;color:#666;">账号：<strong>{{ username }}</strong></p>
        {% if error %}
        <div class="pwd-err">{{ error }}</div>
        {% endif %}
        <form method="post" action="{{ url_for('account_change_password') }}">
            <div class="pwd-field">
                <label for="current_password">当前密码</label>
                <input type="password" id="current_password" name="current_password" required autocomplete="current-password" />
            </div>
            <div class="pwd-field">
                <label for="new_password">新密码（至少 6 位）</label>
                <input type="password" id="new_password" name="new_password" required minlength="6" autocomplete="new-password" />
            </div>
            <div class="pwd-field">
                <label for="confirm_password">确认新密码</label>
                <input type="password" id="confirm_password" name="confirm_password" required minlength="6" autocomplete="new-password" />
            </div>
            <div class="pwd-actions">
                <button type="submit" class="btn">保存</button>
                <a class="btn btn-secondary" href="{{ url_for('index') }}">返回门户</a>
            </div>
        </form>
    </div>
</body>
</html>
